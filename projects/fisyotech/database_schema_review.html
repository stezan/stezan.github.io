<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flooxy — Schema Database</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --accent-green: #16a34a;
    --accent-orange: #ea580c;
    --accent-red: #dc2626;
    --accent-purple: #7c3aed;
    --tag-bg: #f1f5f9;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  header {
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    color: white;
    padding: 2rem;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }

  header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .25rem; }
  header p { font-size: .9rem; opacity: .85; }

  .toolbar {
    display: flex;
    gap: .75rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .toolbar input[type="search"] {
    padding: .5rem 1rem;
    border: none;
    border-radius: 999px;
    width: 280px;
    font-size: .9rem;
    outline: none;
  }

  .toolbar button {
    padding: .4rem .9rem;
    border: 2px solid rgba(255,255,255,.4);
    background: transparent;
    color: white;
    border-radius: 999px;
    cursor: pointer;
    font-size: .8rem;
    font-weight: 600;
    transition: all .2s;
  }

  .toolbar button:hover, .toolbar button.active {
    background: white;
    color: var(--primary);
    border-color: white;
  }

  .stats {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-top: .75rem;
    font-size: .8rem;
    opacity: .85;
  }

  .stats span { font-weight: 600; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .section-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary);
    margin: 2rem 0 1rem;
    padding-bottom: .5rem;
    border-bottom: 2px solid var(--primary-light);
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .section-title .icon { font-size: 1.3rem; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: box-shadow .2s;
  }

  .card:hover { box-shadow: var(--shadow-lg); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .85rem 1.25rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }

  .card-header:hover { background: var(--tag-bg); }

  .card-header .left {
    display: flex;
    align-items: center;
    gap: .75rem;
    min-width: 0;
  }

  .table-name {
    font-weight: 700;
    font-size: 1rem;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: var(--text);
    white-space: nowrap;
  }

  .table-desc {
    font-size: .82rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badges { display: flex; gap: .4rem; flex-shrink: 0; }

  .badge {
    font-size: .7rem;
    padding: .15rem .5rem;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-cols { background: var(--primary-light); color: var(--primary); }
  .badge-fk { background: #fef3c7; color: #92400e; }

  .chevron {
    width: 20px;
    height: 20px;
    transition: transform .25s;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .card.open .card-body { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .85rem;
  }

  thead th {
    text-align: left;
    padding: .6rem 1rem;
    background: var(--tag-bg);
    font-weight: 600;
    color: var(--text-muted);
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    white-space: nowrap;
  }

  tbody td {
    padding: .55rem 1rem;
    border-top: 1px solid var(--border);
    vertical-align: top;
  }

  tbody tr:hover { background: #f8fafc; }

  .col-name {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-weight: 600;
    font-size: .82rem;
    color: var(--text);
  }

  .col-type {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: .8rem;
    color: var(--accent-purple);
  }

  .constraint-tag {
    display: inline-block;
    font-size: .65rem;
    padding: .1rem .4rem;
    border-radius: 4px;
    font-weight: 600;
    margin-right: .25rem;
    margin-bottom: .15rem;
    white-space: nowrap;
  }

  .tag-pk { background: #fef3c7; color: #92400e; }
  .tag-fk { background: #dbeafe; color: #1e40af; }
  .tag-nn { background: #dcfce7; color: #166534; }
  .tag-uq { background: #f3e8ff; color: #6b21a8; }
  .tag-ck { background: #ffe4e6; color: #9f1239; }
  .tag-df { background: #f1f5f9; color: #475569; }

  .col-note {
    font-size: .8rem;
    color: var(--text-muted);
    max-width: 280px;
  }

  .fk-ref {
    font-size: .75rem;
    color: var(--primary);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
  }

  .fk-ref:hover { color: var(--accent-green); }

  .toc {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .toc h2 {
    font-size: 1rem;
    margin-bottom: .75rem;
    color: var(--text);
  }

  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: .4rem;
  }

  .toc-grid a {
    color: var(--primary);
    text-decoration: none;
    font-size: .85rem;
    padding: .3rem .5rem;
    border-radius: 6px;
    transition: background .15s;
  }

  .toc-grid a:hover { background: var(--primary-light); }

  .hidden { display: none !important; }

  @media (max-width: 700px) {
    main { padding: 1rem .75rem; }
    .toolbar input[type="search"] { width: 100%; }
    thead th, tbody td { padding: .4rem .6rem; }
    .table-desc { display: none; }
    .col-note { max-width: 150px; }
  }
</style>
</head>
<body>

<header>
  <h1>Flooxy — Schema del Database</h1>
  <p>Revisione delle entità e dei campi per ogni tabella</p>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Cerca tabella o campo..." autocomplete="off">
    <button data-filter="all" class="active">Tutte</button>
    <button data-filter="auth">Autenticazione</button>
    <button data-filter="sport">Sport</button>
    <button data-filter="body">Corpo & Infortuni</button>
    <button data-filter="rehab">Riabilitazione</button>
    <button data-filter="prev">Prevenzione</button>
    <button data-filter="train">Allenamenti</button>
    <button data-filter="notif">Notifiche</button>
    <button data-filter="other">Altro</button>
  </div>
  <div class="stats">
    <div><span id="totalTables">0</span> tabelle</div>
    <div><span id="totalCols">0</span> colonne totali</div>
    <div><span id="visibleCount">0</span> visibili</div>
  </div>
</header>

<main id="main"></main>

<script>
const schema = [
  // ── 1. Auth & Users ──
  {
    section: "Autenticazione & Utenti",
    icon: "🔐",
    filter: "auth",
    tables: [
      {
        name: "users",
        desc: "Profilo pubblico degli utenti (estensione di auth.users di Supabase)",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, note: "Specchia auth.users(id), impostato alla registrazione" },
          { name: "email", type: "VARCHAR(255)", nn: true, uq: true, note: "Denormalizzato da auth.users" },
          { name: "role", type: "VARCHAR(30)", nn: true, ck: "'athlete','staff','society','admin'", note: "Ruolo dell'utente nell'app" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "deleted_at", type: "TIMESTAMPTZ", note: "Soft-delete" }
        ]
      },
      {
        name: "societies",
        desc: "Società sportive — il cliente B2B",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "user_id", type: "UUID", nn: true, fk: "users(id)", note: "Utente proprietario della società" },
          { name: "name", type: "VARCHAR(255)", nn: true, note: "Nome della società" },
          { name: "official_email", type: "VARCHAR(255)", nn: true, note: "Email ufficiale" },
          { name: "phone", type: "VARCHAR(30)", note: "Telefono" },
          { name: "president_name", type: "VARCHAR(255)", note: "Nome del presidente" },
          { name: "sport", type: "VARCHAR(100)", note: "Es. 'football'" },
          { name: "address_street", type: "VARCHAR(255)", note: "Via e numero civico" },
          { name: "address_city", type: "VARCHAR(100)", note: "Città" },
          { name: "address_province", type: "VARCHAR(10)", note: "Sigla provincia (2 lettere), es. 'MI'" },
          { name: "address_postal_code", type: "VARCHAR(10)", note: "CAP, es. '20121'" },
          { name: "address_country", type: "VARCHAR(100)", nn: true, df: "'Italia'", note: "Paese" },
          { name: "logo_url", type: "TEXT", note: "Path Supabase Storage per il logo" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "deleted_at", type: "TIMESTAMPTZ", note: "Soft-delete" }
        ]
      },
      {
        name: "staff_profiles",
        desc: "Allenatori, vice-allenatori, preparatori, ecc.",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "user_id", type: "UUID", nn: true, fk: "users(id)", note: "Utente collegato" },
          { name: "society_id", type: "UUID", nn: true, fk: "societies(id)", note: "Società di appartenenza" },
          { name: "first_name", type: "VARCHAR(100)", nn: true, note: "Nome" },
          { name: "last_name", type: "VARCHAR(100)", nn: true, note: "Cognome" },
          { name: "phone", type: "VARCHAR(30)", note: "Telefono" },
          { name: "role_label", type: "VARCHAR(100)", note: "Es. 'Allenatore', 'Vice', 'Preparatore'" },
          { name: "date_of_birth", type: "DATE", note: "Data di nascita" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "deleted_at", type: "TIMESTAMPTZ", note: "Soft-delete" }
        ]
      },
      {
        name: "athlete_profiles",
        desc: "Atleti — registrati dalla società o dallo staff",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "user_id", type: "UUID", nn: true, fk: "users(id)", note: "Utente collegato" },
          { name: "society_id", type: "UUID", nn: true, fk: "societies(id)", note: "Società di appartenenza" },
          { name: "first_name", type: "VARCHAR(100)", nn: true, note: "Nome" },
          { name: "last_name", type: "VARCHAR(100)", nn: true, note: "Cognome" },
          { name: "date_of_birth", type: "DATE", nn: true, note: "Data di nascita" },
          { name: "phone", type: "VARCHAR(30)", note: "Telefono" },
          { name: "dominant_foot", type: "VARCHAR(10)", ck: "'left','right','both'", note: "Piede dominante" },
          { name: "avatar_url", type: "TEXT", note: "Path Supabase Storage per l'avatar" },
          { name: "gdpr_consent", type: "BOOLEAN", nn: true, df: "FALSE", note: "Consenso GDPR" },
          { name: "gdpr_consent_at", type: "TIMESTAMPTZ", note: "Data del consenso GDPR" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "deleted_at", type: "TIMESTAMPTZ", note: "Soft-delete" }
        ]
      },
      {
        name: "admin_profiles",
        desc: "Amministratori interni del sistema",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "user_id", type: "UUID", nn: true, fk: "users(id)", note: "Utente collegato" },
          { name: "first_name", type: "VARCHAR(100)", nn: true, note: "Nome" },
          { name: "last_name", type: "VARCHAR(100)", nn: true, note: "Cognome" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ]
      }
    ]
  },
  // ── 2. Sport Structure ──
  {
    section: "Struttura Sportiva",
    icon: "⚽",
    filter: "sport",
    tables: [
      {
        name: "championships",
        desc: "Campionati e tornei",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "name", type: "VARCHAR(255)", nn: true, note: "Nome del campionato" },
          { name: "sport", type: "VARCHAR(100)", nn: true, df: "'football'", note: "Tipo di sport" },
          { name: "level", type: "VARCHAR(100)", note: "Es. 'Regionale', 'Provinciale'" },
          { name: "season", type: "VARCHAR(20)", nn: true, note: "Es. '2025-2026'" },
          { name: "start_date", type: "DATE", note: "Data inizio" },
          { name: "end_date", type: "DATE", note: "Data fine" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ]
      },
      {
        name: "teams",
        desc: "Squadre della società",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "society_id", type: "UUID", nn: true, fk: "societies(id)", note: "Società proprietaria" },
          { name: "championship_id", type: "UUID", fk: "championships(id)", note: "Campionato associato" },
          { name: "name", type: "VARCHAR(255)", nn: true, note: "Es. 'Prima Squadra', 'Under 17'" },
          { name: "category", type: "VARCHAR(100)", note: "Categoria" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" },
          { name: "deleted_at", type: "TIMESTAMPTZ", note: "Soft-delete" }
        ]
      },
      {
        name: "team_athlete_memberships",
        desc: "Associazione atleti ↔ squadre (molti-a-molti)",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "team_id", type: "UUID", nn: true, fk: "teams(id)", note: "Squadra" },
          { name: "athlete_id", type: "UUID", nn: true, fk: "athlete_profiles(id)", note: "Atleta" },
          { name: "jersey_number", type: "SMALLINT", note: "Numero di maglia" },
          { name: "position", type: "VARCHAR(50)", note: "Posizione in campo" },
          { name: "joined_at", type: "DATE", note: "Data di ingresso" },
          { name: "left_at", type: "DATE", note: "Data di uscita" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ],
        unique: ["team_id + athlete_id"]
      },
      {
        name: "team_staff_assignments",
        desc: "Associazione staff ↔ squadre (molti-a-molti)",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "team_id", type: "UUID", nn: true, fk: "teams(id)", note: "Squadra" },
          { name: "staff_id", type: "UUID", nn: true, fk: "staff_profiles(id)", note: "Membro dello staff" },
          { name: "role_in_team", type: "VARCHAR(100)", note: "Es. 'Allenatore principale'" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ],
        unique: ["team_id + staff_id"]
      }
    ]
  },
  // ── 3. Body Map & Injury Taxonomy ──
  {
    section: "Mappa Corporea & Tassonomia Infortuni",
    icon: "🦴",
    filter: "body",
    tables: [
      {
        name: "body_regions",
        desc: "Gerarchia anatomica a 2 livelli: macro-zone (parent_id = NULL) e sotto-zone (parent_id impostato). Injury types si attaccano preferibilmente alle sotto-zone.",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "name", type: "VARCHAR(100)", nn: true, note: "Nome della regione anatomica" },
          { name: "side", type: "VARCHAR(10)", ck: "'left','right','bilateral','none'", note: "Lato del corpo" },
          { name: "parent_id", type: "UUID", fk: "body_regions(id)", note: "NULL = macro-zona; impostato = sotto-zona (auto-riferimento)" },
          { name: "display_order", type: "SMALLINT", nn: true, df: "0", note: "Ordine di visualizzazione" },
          { name: "svg_zone_id", type: "VARCHAR(50)", note: "ID zona SVG nella mappa corporea (macro o sotto-zona)" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ]
      },
      {
        name: "injury_types",
        desc: "Catalogo master delle diagnosi di infortunio",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "body_region_id", type: "UUID", nn: true, fk: "body_regions(id)", note: "Regione corporea associata" },
          { name: "name", type: "VARCHAR(255)", nn: true, note: "Nome del tipo di infortunio" },
          { name: "category", type: "VARCHAR(50)", ck: "'trauma','non_trauma','overload'", note: "Categoria" },
          { name: "severity_levels", type: "JSONB", note: "Es. {\"I\": \"lieve\", \"II\": \"moderata\", \"III\": \"grave\"}" },
          { name: "avg_recovery_days", type: "SMALLINT", note: "Giorni medi di recupero (da letteratura)" },

          { name: "updated_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }

  },
  // ── 4. Injury Assessment Flow ──
  {
    section: "Flusso di Valutazione Infortuni",
    icon: "🩺",
    filter: "body",
    tables: [
      {
        name: "assessment_flow_nodes",
        desc: "Nodi (domande / schermate informative) nel flusso diagnostico guidato",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "node_type", type: "VARCHAR(30)", nn: true, ck: "'question','info','result'", note: "Tipo di nodo" },
          { name: "title", type: "TEXT", nn: true, note: "Titolo/domanda" },
          { name: "body_region_id", type: "UUID", fk: "body_regions(id)", note: "Regione corporea associata" },

          { name: "display_order", type: "SMALLINT", nn: true, df: "0", note: "Ordine di visualizzazione" },

          { name: "platform", type: "VARCHAR(20)", ck: "'android','ios','web'", note: "Piattaforma" },
          { name: "session_id", type: "UUID", note: "ID sessione utente" },
          { name: "occurred_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()", note: "Data/ora dell'evento" }
        ]
      }
    ]
  },
  // ── 13. Notifications ──
  {
    section: "Notifiche",
    icon: "🔔",
    filter: "notif",
    tables: [
      {
        name: "notifications",
        desc: "Definizione della notifica — titolo, corpo, audience, scheduling. Creata manualmente dall'admin o automaticamente da una Edge Function.",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "created_by_admin_id", type: "UUID", fk: "admin_profiles(id)", note: "Admin che ha creato la notifica (NULL se automatica)" },
          { name: "title", type: "VARCHAR(255)", nn: true, note: "Titolo della notifica" },
          { name: "body", type: "TEXT", nn: true, note: "Testo della notifica" },
          { name: "trigger_type", type: "VARCHAR(20)", nn: true, ck: "'manual','automatic'", note: "manual = admin; automatic = sistema" },
          { name: "trigger_event", type: "VARCHAR(100)", note: "Es. 'program_assigned', 'injury_status_changed' (NULL per manuale)" },
          { name: "target_scope", type: "VARCHAR(20)", nn: true, ck: "'all','society','team','athlete'", note: "Ampiezza audience" },
          { name: "target_society_id", type: "UUID", fk: "societies(id)", note: "Società target (se scope = society)" },
          { name: "target_team_id", type: "UUID", fk: "teams(id)", note: "Squadra target (se scope = team)" },
          { name: "target_athlete_id", type: "UUID", fk: "athlete_profiles(id)", note: "Atleta target (se scope = athlete)" },
          { name: "scheduled_at", type: "TIMESTAMPTZ", note: "NULL = invio immediato; impostato = invio programmato" },
          { name: "sent_at", type: "TIMESTAMPTZ", note: "Impostato dalla Edge Function quando il fan-out è completato" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ]
      },
      {
        name: "notification_deliveries",
        desc: "Una riga per coppia (notifica, utente) — record di consegna + ricevuta di lettura. Alimentata dalla Edge Function via service-role key.",
        columns: [
          { name: "id", type: "UUID", pk: true, nn: true, df: "gen_random_uuid()" },
          { name: "notification_id", type: "UUID", nn: true, fk: "notifications(id)", note: "Notifica consegnata" },
          { name: "user_id", type: "UUID", nn: true, fk: "users(id)", note: "Destinatario" },
          { name: "read_at", type: "TIMESTAMPTZ", note: "NULL = non letto; impostato quando l'utente apre la notifica" },
          { name: "created_at", type: "TIMESTAMPTZ", nn: true, df: "NOW()" }
        ],
        unique: ["notification_id + user_id"]
      }
    ]
  }
];

function renderConstraints(col) {
  let html = '';
  if (col.pk)  html += '<span class="constraint-tag tag-pk">PK</span>';
  if (col.fk)  html += '<span class="constraint-tag tag-fk">FK</span>';
  if (col.nn)  html += '<span class="constraint-tag tag-nn">NOT NULL</span>';
  if (col.uq)  html += '<span class="constraint-tag tag-uq">UNIQUE</span>';
  if (col.ck)  html += `<span class="constraint-tag tag-ck">CHECK ${col.ck}</span>`;
  if (col.df)  html += `<span class="constraint-tag tag-df">DEFAULT ${col.df}</span>`;
  return html;
}

function renderFK(col) {
  if (!col.fk) return '';
  const tableName = col.fk.split('(')[0];
  return `<span class="fk-ref" onclick="scrollToTable('${tableName}')" title="Vai a ${tableName}">→ ${col.fk}</span>`;
}

function countFK(cols) {
  return cols.filter(c => c.fk).length;
}

function render() {
  const main = document.getElementById('main');
  let totalTables = 0, totalCols = 0;

  // TOC
  let tocHtml = '<div class="toc"><h2>Indice delle Tabelle</h2><div class="toc-grid">';
  schema.forEach(s => {
    s.tables.forEach(t => {
      tocHtml += `<a href="#" onclick="scrollToTable('${t.name}');return false">${t.name}</a>`;
    });
  });
  tocHtml += '</div></div>';

  let html = tocHtml;

  schema.forEach(section => {
    html += `<div class="section-group" data-filter="${section.filter}">`;
    html += `<div class="section-title"><span class="icon">${section.icon}</span> ${section.section}</div>`;
    section.tables.forEach(table => {
      totalTables++;
      totalCols += table.columns.length;
      const fkCount = countFK(table.columns);

      html += `<div class="card" data-table="${table.name}" id="table-${table.name}">`;
      html += `<div class="card-header" onclick="this.parentElement.classList.toggle('open')">`;
      html += `<div class="left">`;
      html += `<span class="table-name">${table.name}</span>`;
      html += `<span class="table-desc">${table.desc}</span>`;
      html += `</div>`;
      html += `<div class="badges">`;
      html += `<span class="badge badge-cols">${table.columns.length} colonne</span>`;
      if (fkCount) html += `<span class="badge badge-fk">${fkCount} FK</span>`;
      html += `</div>`;
      html += `<svg class="chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>`;
      html += `</div>`;

      html += `<div class="card-body"><table><thead><tr>`;
      html += `<th>Campo</th><th>Tipo</th><th>Vincoli</th><th>Riferimento</th><th>Descrizione</th>`;
      html += `</tr></thead><tbody>`;

      table.columns.forEach(col => {
        html += `<tr>`;
        html += `<td class="col-name">${col.name}</td>`;
        html += `<td class="col-type">${col.type}</td>`;
        html += `<td>${renderConstraints(col)}</td>`;
        html += `<td>${renderFK(col)}</td>`;
        html += `<td class="col-note">${col.note || ''}</td>`;
        html += `</tr>`;
      });

      if (table.unique) {
        table.unique.forEach(u => {
          html += `<tr><td colspan="5" style="font-size:.8rem;color:var(--accent-purple);padding:.5rem 1rem;">⚡ Vincolo UNIQUE: <strong>${u}</strong></td></tr>`;
        });
      }

      html += `</tbody></table></div></div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;
  document.getElementById('totalTables').textContent = totalTables;
  document.getElementById('totalCols').textContent = totalCols;
  document.getElementById('visibleCount').textContent = totalTables;
}

function scrollToTable(name) {
  const el = document.getElementById('table-' + name);
  if (!el) return;
  el.classList.add('open');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  el.style.outline = '2px solid var(--primary)';
  setTimeout(() => el.style.outline = '', 2000);
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const match = !q || card.dataset.table.includes(q) || card.innerHTML.toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visible++;
  });

  document.querySelectorAll('.section-group').forEach(sg => {
    const hasVisible = sg.querySelector('.card:not(.hidden)');
    sg.classList.toggle('hidden', !hasVisible);
  });

  document.getElementById('visibleCount').textContent = visible;
});

// Filters
document.querySelectorAll('.toolbar button').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const f = this.dataset.filter;
    let visible = 0;

    document.querySelectorAll('.section-group').forEach(sg => {
      const match = f === 'all' || sg.dataset.filter === f;
      sg.classList.toggle('hidden', !match);
      if (match) sg.querySelectorAll('.card').forEach(c => { c.classList.remove('hidden'); visible++; });
    });

    document.getElementById('visibleCount').textContent = visible;
    document.getElementById('search').value = '';
  });
});

render();
</script>
</body>
</html>
